<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Image Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2e;
    --accent: #c8f060;
    --text: #e8e8e6;
    --muted: #6b6b70;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .scale-badge {
    font-size: 12px;
    color: var(--accent);
    background: rgba(200,240,96,0.08);
    border: 1px solid rgba(200,240,96,0.2);
    padding: 3px 10px;
    border-radius: 20px;
    min-width: 64px;
    text-align: center;
    transition: all 0.15s;
  }

  .container-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 0;
  }

  .container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 900px;
    max-height: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: grab;
  }

  .container.grabbing { cursor: grabbing; }
  .container.at-min { cursor: zoom-in; }

  .container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  img#photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform-origin: 0 0;
    transform: translate(0px, 0px) scale(1);
    pointer-events: none;
    z-index: 1;
    will-change: transform;
    transition: transform 0.05s linear;
  }

  img#photo.snap {
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    cursor: pointer;
  }

  .upload-overlay.hidden { display: none; }

  .upload-icon {
    width: 52px; height: 52px;
    border: 2px dashed var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: var(--muted);
    transition: border-color 0.2s, color 0.2s;
  }

  .upload-overlay:hover .upload-icon {
    border-color: var(--accent);
    color: var(--accent);
  }

  .upload-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  button.active {
    background: var(--accent);
    color: #0e0e0f;
    border-color: var(--accent);
  }

  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  input[type=file] { display: none; }
</style>
</head>
<body>

<header>
  <span class="logo">VIEWER</span>
  <span class="hint">scroll · pinch · drag · double-click</span>
  <span class="scale-badge" id="scaleBadge">1.00×</span>
</header>

<div class="container-wrap">
  <div class="container at-min" id="container">
    <img id="photo" src="" alt="">
    <div class="upload-overlay" id="uploadOverlay">
      <div class="upload-icon">↑</div>
      <span class="upload-label">Click to load image</span>
    </div>
  </div>
</div>

<div class="controls">
  <button id="btnZoomOut">− Zoom Out</button>
  <button id="btnZoomIn">+ Zoom In</button>
  <div class="sep"></div>
  <button id="btnReset">Reset</button>
  <div class="sep"></div>
  <button id="btnLoad">Load Image</button>
  <input type="file" id="fileInput" accept="image/*">
</div>

<script>
const container = document.getElementById('container');
const photo = document.getElementById('photo');
const scaleBadge = document.getElementById('scaleBadge');
const uploadOverlay = document.getElementById('uploadOverlay');
const fileInput = document.getElementById('fileInput');

const MIN_SCALE = 1;
const MAX_SCALE = 8;
const ZOOM_STEP = 0.15;

let scale = 1;
let tx = 0, ty = 0;
let isDragging = false;
let lastX = 0, lastY = 0;
let imageLoaded = false;

// Default demo image
photo.src = 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80';
photo.onload = () => { imageLoaded = true; uploadOverlay.classList.add('hidden'); applyTransform(true); };
photo.onerror = () => {};

function clampTranslate(x, y, s) {
  const cw = container.clientWidth;
  const ch = container.clientHeight;
  // Image fills container at scale=1, so at scale s the image is s*cw by s*ch
  // tx must be <= 0 and >= cw - s*cw = cw*(1-s)
  const maxX = 0;
  const minX = cw - s * cw;
  const maxY = 0;
  const minY = ch - s * ch;
  return [
    Math.min(maxX, Math.max(minX, x)),
    Math.min(maxY, Math.max(minY, y))
  ];
}

function applyTransform(snap = false) {
  if (snap) photo.classList.add('snap');
  else photo.classList.remove('snap');
  photo.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  scaleBadge.textContent = scale.toFixed(2) + '×';
  container.classList.toggle('at-min', scale <= MIN_SCALE);
}

function zoomAt(cx, cy, newScale) {
  // cx, cy: point in container coords to zoom toward
  newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
  // Maintain point under cursor
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  if (scale === MIN_SCALE) { tx = 0; ty = 0; }
  else [tx, ty] = clampTranslate(tx, ty, scale);
  applyTransform();
}

// Mouse wheel
container.addEventListener('wheel', e => {
  if (!imageLoaded) return;
  e.preventDefault();
  const rect = container.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP;
  zoomAt(cx, cy, scale + delta * scale);
}, { passive: false });

// Double click
container.addEventListener('dblclick', e => {
  if (!imageLoaded) return;
  const rect = container.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const midpoint = (MIN_SCALE + MAX_SCALE) / 2;
  const target = scale >= midpoint ? MIN_SCALE : MAX_SCALE;
  zoomAt(cx, cy, target);
  // Snap animation
  photo.classList.add('snap');
});

// Drag
container.addEventListener('mousedown', e => {
  if (!imageLoaded || scale <= MIN_SCALE) return;
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  container.classList.add('grabbing');
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  tx += dx; ty += dy;
  [tx, ty] = clampTranslate(tx, ty, scale);
  applyTransform();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  container.classList.remove('grabbing');
});

// Touch pinch + drag
let lastTouches = null;
let lastPinchDist = null;
let lastPinchMid = null;

container.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    lastPinchDist = getPinchDist(e.touches);
    lastPinchMid = getPinchMid(e.touches, container);
  } else if (e.touches.length === 1 && scale > MIN_SCALE) {
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
  lastTouches = e.touches.length;
}, { passive: false });

container.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!imageLoaded) return;
  if (e.touches.length === 2) {
    const dist = getPinchDist(e.touches);
    const mid = getPinchMid(e.touches, container);
    if (lastPinchDist !== null) {
      const ratio = dist / lastPinchDist;
      zoomAt(mid.x, mid.y, scale * ratio);
    }
    lastPinchDist = dist;
    lastPinchMid = mid;
  } else if (e.touches.length === 1 && scale > MIN_SCALE) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    tx += dx; ty += dy;
    [tx, ty] = clampTranslate(tx, ty, scale);
    applyTransform();
  }
}, { passive: false });

container.addEventListener('touchend', e => {
  if (e.touches.length < 2) { lastPinchDist = null; lastPinchMid = null; }
});

// Double tap
let lastTap = 0;
container.addEventListener('touchend', e => {
  if (e.changedTouches.length !== 1) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    const rect = container.getBoundingClientRect();
    const cx = e.changedTouches[0].clientX - rect.left;
    const cy = e.changedTouches[0].clientY - rect.top;
    const midpoint = (MIN_SCALE + MAX_SCALE) / 2;
    const target = scale >= midpoint ? MIN_SCALE : MAX_SCALE;
    zoomAt(cx, cy, target);
    photo.classList.add('snap');
  }
  lastTap = now;
});

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function getPinchMid(touches, el) {
  const rect = el.getBoundingClientRect();
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2 - rect.left,
    y: (touches[0].clientY + touches[1].clientY) / 2 - rect.top,
  };
}

// Buttons
document.getElementById('btnZoomIn').addEventListener('click', () => {
  const cx = container.clientWidth / 2, cy = container.clientHeight / 2;
  zoomAt(cx, cy, scale * (1 + ZOOM_STEP * 2));
  photo.classList.add('snap');
});

document.getElementById('btnZoomOut').addEventListener('click', () => {
  const cx = container.clientWidth / 2, cy = container.clientHeight / 2;
  zoomAt(cx, cy, scale * (1 - ZOOM_STEP * 2));
  photo.classList.add('snap');
});

document.getElementById('btnReset').addEventListener('click', () => {
  scale = 1; tx = 0; ty = 0;
  applyTransform(true);
});

document.getElementById('btnLoad').addEventListener('click', () => fileInput.click());
uploadOverlay.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  photo.onload = () => { imageLoaded = true; uploadOverlay.classList.add('hidden'); scale=1; tx=0; ty=0; applyTransform(true); };
  photo.src = url;
  e.target.value = '';
});
</script>
</body>
</html>
